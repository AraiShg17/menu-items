steps:
  # Install dependencies without leaking secrets into the image context
  - name: gcr.io/cloud-builders/npm
    id: install
    args: ["ci"]

  # Build Next.js with OPEN_AI_API_KEY injected from Secret Manager
  - name: gcr.io/cloud-builders/npm
    id: build
    entrypoint: bash
    args:
      - "-c"
      - |
        npm run build
    secretEnv:
      - OPEN_AI_API_KEY

  # Build the container image
  - name: gcr.io/cloud-builders/docker
    id: docker-build
    args: ["build", "-t", "gcr.io/$PROJECT_ID/menu-items:$_IMAGE_TAG", "."]

  # Push the image
  - name: gcr.io/cloud-builders/docker
    id: docker-push
    args: ["push", "gcr.io/$PROJECT_ID/menu-items:$_IMAGE_TAG"]

  # Deploy to Cloud Run and mount the same secret at runtime
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    entrypoint: bash
    args:
      - "-c"
      - |
        gcloud run deploy $_SERVICE_NAME \
          --image gcr.io/$PROJECT_ID/menu-items:$_IMAGE_TAG \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --update-secrets OPEN_AI_API_KEY=OPEN_AI_API_KEY:latest,OPENAI_API_KEY=OPEN_AI_API_KEY:latest \
          --set-env-vars NODE_ENV=production
    secretEnv:
      - OPEN_AI_API_KEY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/OPEN_AI_API_KEY/versions/latest
      env: OPEN_AI_API_KEY

images:
  - gcr.io/$PROJECT_ID/menu-items:$_IMAGE_TAG

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE_TAG: "manual"
